[colors]
# Latar belakang semi-transparan (cc = sekitar 80% opacity)
background = #44
background-alt = #44475a
foreground = #f8f8f2
primary = #bd93f9
secondary = #000035
alert = #ff5555
disabled = #6272a4
green = #50fa7b

[bar/zexed]
width = 100%
height = 24pt
offset-x = 2%
offset-y = 1%
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 1
padding = 4
#module-margin = 1

# Menggunakan JetBrainsMono Nerd Font
font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font:size=12;3"

# Menambahkan modul menu di paling kiri
modules-left = menu sep xworkspaces
modules-center = clock sep date
modules-right = cpu sep memory sep brightness sep pulseaudio sep systray

cursor-click = pointer
enable-ipc = true

[module/sep]
type = custom/text
content = " "
content-foreground = ${colors.primary}
content-margin = 1

[module/menu]
type = custom/text
# Logo ala Mint (Ikon Linux/Distro)
content = "󰣭 " 
content-foreground = #50fa7b
content-font = 2
# Klik kiri untuk membuka Rofi
click-left = rofi -show drun

[module/xworkspaces]
type = internal/xworkspaces

# --- Pengaturan Ikon ---
# Ikon saat Workspace aktif (PACMAN)
label-active = 󰮯 %name%
label-active-foreground = ${colors.primary}
label-active-background = ${colors.background-alt}
label-active-padding = 1
label-active-underline = ${colors.primary}

# Ikon saat Workspace berisi aplikasi tapi tidak dibuka (GHOST)
label-occupied = 󰊠 %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

# Ikon saat Workspace kosong/inactive (GHOST REDUP)
label-empty = 󰊠 %name%
label-empty-foreground = ${colors.foreground}
label-empty-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/pulseaudio]
type = internal/pulseaudio

# format
format-volume = <ramp-volume> <bar-volume>

#Horizontal bar settings
bar-volume-width = 5
bar-volume-foreground-0 = ${colors.primary}
bar-volume-gradient = false
bar-volume-indicator = " "
bar-volume-indicator-font = 2
bar-volume-fill = ─
bar-volume-fill-font = 2
bar-volume-empty = ─
bar-volume-empty-font = 2
bar-volume-empty-foreground = ${colors.background-alt}

# Volume icon
ramp-volume-0 = " "
ramp-volume-1 = " "

# Muted
format-muted = <label-muted> <bar-volume>
label-muted = " "
label-muted-foreground = ${colors.disabled}
format-margin = 5

[module/memory]
type = internal/memory
interval = 2

format-prefix = " "
format-prefix-foreground = ${colors.green}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2

format-prefix = " "
format-prefix-foreground = ${colors.alert}
label = %percentage:2%%

[module/clock]
type = internal/date
interval = 1
date = %H:%M

format-prefix = "󱑂 "
label = %date%
format-prefix-foreground = ${colors.fg}

[module/date]
type = internal/date
interval = 60
date = %d %B %Y
date-alt = %A, %d %B %Y

format-prefix = " "
label = %date%
format-prefix-foreground = ${colors.fg}

[module/brightness]
type = custom/script
exec = ~/.config/polybar/scripts/brightness.sh get
interval = 2

format-prefix-foreground = ${colors.foreground}
format-prefix = "󰃟 "
label = %output%

scroll-up = ~/.config/polybar/scripts/brightness.sh up
scroll-down = ~/.config/polybar/scripts/brightness.sh down

[module/systray]
type = internal/tray
label = %name% %output%
tray-position = right
tray-padding = 2
tray-size = 60%
tray-scale = 1.0
